# ==========================================
# Font Settings
# ==========================================
font_size 18.0
# BEGIN_KITTY_FONTS
font_family      family='Iosevka Term' postscript_name=Iosevka-Term
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Disable ligatures only when the cursor is over them (great for code editing)
disable_ligatures cursor

# ==========================================
# UI & Core Settings
# ==========================================
enable_audio_bell no
visual_bell_duration 0.0

# Cleaner aesthetic by hiding title bars
hide_window_decorations titlebar-only 
window_padding_width 4

# ==========================================
# Layouts
# ==========================================
# Kitty defaults to 'fat' and 'tall' layouts. To get true tmux-like 
# vertical and horizontal splits, we need to explicitly enable 'splits'.
enabled_layouts splits, stack

# ==========================================
# Tmux-like Keybindings (Leader: Ctrl+b)
# ==========================================
# Note: If you run actual `tmux` inside Kitty and also use `Ctrl+b` as your 
# tmux prefix, Kitty will intercept these keystrokes. 

# Tab Management
map ctrl+b>c new_tab
map ctrl+b>1 goto_tab 1
map ctrl+b>2 goto_tab 2
map ctrl+b>3 goto_tab 3
map ctrl+b>4 goto_tab 4
map ctrl+b>5 goto_tab 5 
map ctrl+b>6 goto_tab 6
map ctrl+b>7 goto_tab 7
map ctrl+b>8 goto_tab 8
map ctrl+b>9 goto_tab 9
map ctrl+b>0 goto_tab 10

# Window Management (Splits)
# Changed generic `new_window` to specific directional splits
map ctrl+b>v launch --location=vsplit
map ctrl+b>s launch --location=hsplit
map ctrl+b>x close_window

# Window Navigation
map ctrl+b>l neighboring_window right
map ctrl+b>j neighboring_window bottom
map ctrl+b>h neighboring_window left
map ctrl+b>k neighboring_window top

# Window Moving
map ctrl+b>shift+h move_window left
map ctrl+b>shift+j move_window bottom
map ctrl+b>shift+k move_window top
map ctrl+b>shift+l move_window right

# Toggle Zoom (Stack layout)
map ctrl+b>z toggle_layout stack

# ==========================================
# Theme
# ==========================================
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
